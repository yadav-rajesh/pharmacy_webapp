spring.application.name=backend
server.port=8080
medicine-requests.storage-dir=data/medicine-requests
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.datasource.url=jdbc:h2:file:./data/pharmacy-db;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
medicine-requests.notifications.email.enabled=false
medicine-requests.notifications.email.recipient=
medicine-requests.notifications.email.from=
medicine-requests.notifications.email.subject-prefix=[Padmavati Medicals]
medicine-requests.notifications.whatsapp.recipient-number=
