spring.application.name=${SPRING_APPLICATION_NAME:backend}
server.port=${SERVER_PORT:8080}
medicine-requests.storage-dir=${MEDICINE_REQUESTS_STORAGE_DIR:data/medicine-requests}
medicine-requests.upload.max-file-size-bytes=${MEDICINE_REQUESTS_UPLOAD_MAX_FILE_SIZE_BYTES:5242880}
medicine-requests.upload.allowed-extensions=${MEDICINE_REQUESTS_UPLOAD_ALLOWED_EXTENSIONS:jpg,jpeg,png,pdf}
medicine-requests.upload.allowed-content-types=${MEDICINE_REQUESTS_UPLOAD_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,application/pdf}
medicine-requests.rate-limit.enabled=${MEDICINE_REQUESTS_RATE_LIMIT_ENABLED:true}
medicine-requests.rate-limit.max-requests=${MEDICINE_REQUESTS_RATE_LIMIT_MAX_REQUESTS:10}
medicine-requests.rate-limit.window-seconds=${MEDICINE_REQUESTS_RATE_LIMIT_WINDOW_SECONDS:600}
medicine-requests.notifications.email.enabled=${MEDICINE_REQUESTS_NOTIFICATIONS_EMAIL_ENABLED:false}
medicine-requests.notifications.email.recipient=${MEDICINE_REQUESTS_NOTIFICATIONS_EMAIL_RECIPIENT:}
medicine-requests.notifications.email.from=${MEDICINE_REQUESTS_NOTIFICATIONS_EMAIL_FROM:}
medicine-requests.notifications.email.subject-prefix=${MEDICINE_REQUESTS_NOTIFICATIONS_EMAIL_SUBJECT_PREFIX:[Padmavati Medicals]}
medicine-requests.notifications.whatsapp.recipient-number=${MEDICINE_REQUESTS_NOTIFICATIONS_WHATSAPP_RECIPIENT_NUMBER:}
backend.cors.allowed-origins=${BACKEND_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
backend.cors.allowed-methods=${BACKEND_CORS_ALLOWED_METHODS:GET,POST,PATCH,OPTIONS}
backend.cors.allowed-headers=${BACKEND_CORS_ALLOWED_HEADERS:*}
backend.cors.allow-credentials=${BACKEND_CORS_ALLOW_CREDENTIALS:false}
backend.cors.max-age-seconds=${BACKEND_CORS_MAX_AGE_SECONDS:3600}
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:5MB}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/pharmacy-db;MODE=PostgreSQL;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}
